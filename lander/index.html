<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aestrist — Technology built for the public good.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <title>Aestrist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; line-height: 1.6; }
    .container { max-width: 640px; margin: 0 auto; padding: 80px 24px; }
    .logo img { width: 100%; max-width: 400px; }
    .tagline { color: #888; font-size: 1.15rem; margin-bottom: 40px; max-width: 440px; }
    .section { margin-bottom: 40px; }
    .section h2 { font-size: 1rem; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .section p { color: #aaa; max-width: 480px; }
    .products { list-style: none; }
    .products li { padding: 8px 0; color: #bbb; border-bottom: 1px solid #1a1a1a; }
    .products li:last-child { border-bottom: none; }
    .products li span { color: #666; font-size: 0.85rem; margin-left: 8px; }
    .footer { margin-top: 72px; color: #444; font-size: 0.8rem; }
    .footer a { color: #777; text-decoration: none; }
    .footer a:hover { color: #bbb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Aestrist">
    </div>

    <p class="tagline">Technology built for the public good.</p>

    <div class="section">
      <h2>About</h2>
      <p>We're a technology company working on tools and infrastructure that help people and the planet. Simple as that.</p>
    </div>

    <div class="section">
      <h2>Products</h2>
      <ul class="products">
        <li>AI App Builder <span>coming soon</span></li>
        <li>Inference Gateway <span>coming soon</span></li>
      </ul>
    </div>

    <div class="footer">
      <p>Aestrist · Sole Trader · United Kingdom</p>
    </div>
  </div>
</body>
</html>
